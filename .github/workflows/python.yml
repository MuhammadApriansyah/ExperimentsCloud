name: ExperimentsCloud CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg sqlite3

      - name: Run CI
        run: |
          chmod +x scripts/*.sh
          ./scripts/ci.sh
