{% extends "base.html" %}

{% block title %}
Upload File
{% endblock %}

{% block content %}

<h2>Upload File</h2>

<form
    method="POST"
    enctype="multipart/form-data">

    {{ form.hidden_tag() }}

    <p>
        {{ form.file() }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

{% endblock %}
