<header>

    <h2>ExperimentsCloud</h2>

    <nav>

        <a href="{{ url_for('home') }}">
            Home
        </a>

        {% if current_user.is_authenticated %}

            <a href="{{ url_for('auth.dashboard') }}">
                Dashboard
            </a>

            <a href="{{ url_for('files.index') }}">
                My Files
            </a>

            <a href="{{ url_for('auth.logout') }}">
                Logout
            </a>

        {% else %}

            <a href="{{ url_for('auth.login') }}">
                Login
            </a>

            <a href="{{ url_for('auth.register') }}">
                Register
            </a>

        {% endif %}

    </nav>

    <hr>

</header>
