{% extends "base.html" %}

{% block content %}

<h2>Folders</h2>

<p>
    <a href="{{ url_for('folders.create') }}">
        Create Folder
    </a>
</p>

<ul>

{% for folder in folders %}

<li>

    {{ folder.name }}

    <a href="{{ url_for('folders.rename', folder_id=folder.id) }}">
        Rename
    </a>

    <form
        method="POST"
        action="{{ url_for('folders.delete', folder_id=folder.id) }}"
        style="display:inline"
    >

        <button type="submit">

            Delete

        </button>

    </form>

</li>

{% else %}

<li>No folders.</li>

{% endfor %}

</ul>

{% endblock %}
